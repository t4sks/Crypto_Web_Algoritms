<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Scytale Cipher</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>Шифр Сцитала</h1>

    <label>Текст</label>
    <textarea id="text" placeholder="Введите текст"></textarea>

    <label>Ключ (m)</label>
    <input type="number" id="key" min="1" value="3">

    <label>Операция</label>
    <select id="operation">
        <option value="encrypt">Шифровать</option>
        <option value="decrypt">Расшифровать</option>
    </select>

    <button onclick="sendRequest()">Выполнить</button>

    <h2>Результат</h2>
    <pre id="result"></pre>

</div>

<script src="/static/app.js"></script>
</body>
</html>
